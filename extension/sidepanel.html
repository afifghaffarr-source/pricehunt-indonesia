<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fff;
      color: #111827;
      font-size: 13px;
    }
    .header {
      background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
      color: white;
      padding: 16px 20px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header h1 { font-size: 18px; font-weight: 700; }
    .header p { font-size: 11px; opacity: 0.85; margin-top: 2px; }
    .content { padding: 16px 20px; }
    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 16px;
    }
    .stat-card {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 12px;
    }
    .stat-label { font-size: 10px; color: #6b7280; text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-value { font-size: 20px; font-weight: 700; color: #111827; margin-top: 4px; }
    .stat-sublabel { font-size: 10px; color: #6b7280; margin-top: 2px; }
    .section { margin-bottom: 20px; }
    .section-title { font-size: 12px; font-weight: 700; color: #374151; margin-bottom: 8px; }
    .btn {
      display: block;
      width: 100%;
      padding: 10px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
    }
    .btn:hover { background: #1d4ed8; }
    .btn:disabled { background: #9ca3af; cursor: not-allowed; }
    .btn-secondary { background: #6b7280; }
    .btn-secondary:hover { background: #4b5563; }
    .btn-success { background: #10b981; }
    .btn-success:hover { background: #059669; }
    .history-item {
      padding: 10px;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }
    .history-meta { flex: 1; min-width: 0; }
    .history-title {
      font-weight: 600;
      font-size: 12px;
      color: #111827;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .history-detail { font-size: 11px; color: #6b7280; margin-top: 2px; }
    .history-badge {
      font-size: 10px;
      padding: 3px 8px;
      border-radius: 4px;
      color: white;
      font-weight: 600;
      flex-shrink: 0;
    }
    .badge-success { background: #10b981; }
    .badge-failed { background: #ef4444; }
    .badge-skipped { background: #6b7280; }
    .empty-state {
      text-align: center;
      padding: 32px 16px;
      color: #6b7280;
      font-size: 12px;
    }
    .empty-icon { font-size: 32px; margin-bottom: 8px; }
    .instructions {
      background: #fef3c7;
      border: 1px solid #f59e0b;
      border-radius: 6px;
      padding: 10px 12px;
      margin-bottom: 16px;
      font-size: 11px;
      color: #78350f;
    }
    .instructions strong { display: block; margin-bottom: 4px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>🛒 BijakBeli Scraper</h1>
    <p>Auto-scrape marketplace untuk komunitas</p>
  </div>
  <div class="content" id="app">
    <div class="empty-state">
      <div class="empty-icon">⏳</div>
      <div>Memuat...</div>
    </div>
  </div>
  <script src="lib/shared.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>

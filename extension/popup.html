<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 320px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff; }
    .header { background: #2563eb; color: white; padding: 12px 16px; display: flex; align-items: center; gap: 8px; }
    .header h1 { font-size: 16px; font-weight: 700; }
    .content { padding: 16px; }
    .price-info { background: #f3f4f6; border-radius: 8px; padding: 12px; margin-bottom: 12px; }
    .price-label { font-size: 11px; color: #6b7280; margin-bottom: 4px; }
    .price-value { font-size: 20px; font-weight: 700; color: #2563eb; }
    .marketplace { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #e5e7eb; font-size: 13px; }
    .marketplace:last-child { border-bottom: none; }
    .mp-name { font-weight: 500; }
    .mp-price { font-weight: 600; }
    .mp-price.cheapest { color: #059669; }
    .btn { display: block; width: 100%; padding: 10px; background: #2563eb; color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; text-align: center; text-decoration: none; margin-top: 12px; }
    .btn:hover { background: #1d4ed8; }
    .loading { text-align: center; padding: 24px; color: #6b7280; }
  </style>
</head>
<body>
  <div class="header">
    <span>🔍</span>
    <h1>BijakBeli</h1>
  </div>
  <div class="content" id="app">
    <div class="loading">Mendeteksi produk...</div>
  </div>
  <script src="lib/shared.js"></script>
  <script src="popup.js"></script>
</body>
</html>

name: E2E Tests

# Playwright end-to-end tests. Runs in parallel with CI but with serial
# workers (workers=1) to avoid Supabase rate-limit interference.
#
# Triggers: push to master/main, PRs to master/main, manual dispatch.
#
# Required secrets (same as CI):
#   - SUPABASE_URL, SUPABASE_ANON_KEY, SUPABASE_SERVICE_ROLE_KEY

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# Don't cancel the in-progress run if a new commit lands — let it finish
# so we don't waste Supabase rate limit budget.
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: false

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Build app
        run: npm run build

      - name: Start server (background)
        run: |
          npm start > /tmp/next-start.log 2>&1 &
          echo $! > /tmp/next-start.pid
          # Wait for server to be ready (max 30s)
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000 -o /dev/null 2>/dev/null; then
              echo "Server ready after ${i}s"
              break
            fi
            sleep 1
          done

      - name: Diagnostic — capture home page response
        run: |
          echo "=== IMMEDIATE / response status ==="
          curl -sI http://localhost:3000/ | head -5
          echo "=== IMMEDIATE / response body (first 1500 chars) ==="
          curl -s http://localhost:3000/ | head -c 1500
          echo ""
          echo ""
          echo "=== /auth/login response status ==="
          curl -sI http://localhost:3000/auth/login | head -5
          echo ""
          # Simulate what tests do — hit page multiple times with delay
          echo "=== After 30s wait, hit / again ==="
          sleep 30
          curl -sI http://localhost:3000/ | head -5
          echo "=== / response body after wait (first 1500 chars) ==="
          curl -s http://localhost:3000/ | head -c 1500
          echo ""
          echo ""
          echo "=== Server log (last 100 lines) ==="
          tail -100 /tmp/next-start.log

      - name: Run Playwright E2E tests
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
        run: npx playwright test --workers=1

      - name: Stop server
        if: always()
        run: |
          if [ -f /tmp/next-start.pid ]; then
            kill $(cat /tmp/next-start.pid) 2>/dev/null || true
          fi
          pkill -f "next start" 2>/dev/null || true
          pkill -f "next-server" 2>/dev/null || true

      - name: Upload test report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            test-results/
            playwright-report/
          retention-days: 7

      - name: Upload test report on success
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 3

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run linter
        run: npm run lint

      - name: Run typecheck
        run: npm run typecheck

      - name: Check migration versions
        # Enforces audit plan B2.1: no new duplicate version numbers
        # in supabase/migrations/. See scripts/check-migration-versions.mjs.
        run: npm run check:migrations

      - name: Run tests
        run: npm test

      - name: Run coverage
        # Surfaces coverage in CI logs. Soft thresholds (0%) — no PR
        # failure on coverage regressions yet. Tighten once the team
        # commits to coverage goals.
        run: npm run test:coverage

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14
      - name: Build
        run: npm run build
        env:
          # Fallback: try modern names first, then legacy NEXT_PUBLIC_*.
          # The `||` operator in GitHub Actions secret refs picks the first
          # non-empty value. This avoids breaking when secrets were created
          # under a different name than the workflow expects.
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: .next/
          retention-days: 7
